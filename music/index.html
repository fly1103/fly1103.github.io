<script>
document.addEventListener('DOMContentLoaded', function () {
  document.body.classList.add('music-fullscreen')

  const musicList = [
    {
      name: '晴天',
      artist: 'Jay Chou',
      url: 'https://img.flying-cat.cn/music/audio/Jay%20Chou%20-%20qingtian.mp3',
      cover: 'https://img.flying-cat.cn/music/cover/qingtian.jpg',
      lrc: 'https://img.flying-cat.cn/music/lrc/Jay%20Chou%20-%20qingtian.lrc'
    },
    {
      name: '天空之城',
      artist: '李志',
      url: 'https://img.flying-cat.cn/music/audio/%E6%9D%8E%E5%BF%97%20-%20%E5%A4%A9%E7%A9%BA%E4%B9%8B%E5%9F%8E.mp3',
      cover: 'https://img.flying-cat.cn/music/cover/%E6%9D%8E%E5%BF%97%20-%20%E5%A4%A9%E7%A9%BA%E4%B9%8B%E5%9F%8E.cover.jpg',
      lrc: 'https://img.flying-cat.cn/music/lrc/%E6%9D%8E%E5%BF%97%20-%20%E5%A4%A9%E7%A9%BA%E4%B9%8B%E5%9F%8E.lrc'
    },
    {
      name: '孤雏',
      artist: 'AGA',
      url: 'https://img.flying-cat.cn/music/audio/AGA%20-%20%E5%AD%A4%E9%9B%9B.mp3',
      cover: 'https://img.flying-cat.cn/music/cover/AGA%20-%20%E5%AD%A4%E9%9B%9B.cover.jpg',
      lrc: 'https://img.flying-cat.cn/music/lrc/AGA%20-%20%E5%AD%A4%E9%9B%9B.lrc'
    }
  ]

  let currentIndex = 0
  let playMode = 'order'
  let lyricLines = []

  const audio = new Audio()
  audio.preload = 'auto'

  const bgEl = document.getElementById('fcMusicBg')
  const coverEl = document.getElementById('fcMusicCover')
  const titleEl = document.getElementById('fcMusicTitle')
  const artistEl = document.getElementById('fcMusicArtist')
  const currentLyricEl = document.getElementById('fcLyricCurrent')
  const nextLyricEl = document.getElementById('fcLyricNext')
  const progressEl = document.getElementById('fcProgress')
  const currentTimeEl = document.getElementById('fcCurrentTime')
  const durationEl = document.getElementById('fcDuration')
  const playBtn = document.getElementById('fcPlay')
  const prevBtn = document.getElementById('fcPrev')
  const nextBtn = document.getElementById('fcNext')
  const modeBtn = document.getElementById('fcMode')
  const listBtn = document.getElementById('fcListBtn')
  const modeTextEl = document.getElementById('fcModeText')
  const drawerEl = document.getElementById('fcPlaylistDrawer')
  const drawerListEl = document.getElementById('fcPlaylistList')
  const drawerCloseEl = document.getElementById('fcPlaylistClose')
  const exitBtn = document.getElementById('fcMusicExit')

  function clearButtonState() {
    const buttons = [playBtn, prevBtn, nextBtn, modeBtn, listBtn, drawerCloseEl, exitBtn]

    buttons.forEach(btn => {
      if (!btn) return
      btn.classList.remove('is-pressing')
      if (typeof btn.blur === 'function') btn.blur()
    })

    if (document.activeElement && typeof document.activeElement.blur === 'function') {
      document.activeElement.blur()
    }
  }

  function pressButton(btn) {
    if (!btn) return

    btn.classList.add('is-pressing')

    setTimeout(() => {
      btn.classList.remove('is-pressing')
      if (typeof btn.blur === 'function') btn.blur()
    }, 120)
  }

  function formatTime(sec) {
    if (!isFinite(sec)) return '00:00'

    const m = Math.floor(sec / 60)
    const s = Math.floor(sec % 60)

    return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`
  }

  function parseLrc(text) {
    const result = []

    text.split('\n').forEach(line => {
      const match = line.match(/\[(\d+):(\d+(?:\.\d+)?)\](.*)/)

      if (!match) return

      const min = parseInt(match[1], 10)
      const sec = parseFloat(match[2])
      const content = (match[3] || '').trim()

      if (!content) return

      result.push({
        time: min * 60 + sec,
        text: content
      })
    })

    return result.sort((a, b) => a.time - b.time)
  }

  async function loadLyric(url) {
    try {
      const res = await fetch(url)
      const txt = await res.text()

      lyricLines = parseLrc(txt)
      updateLyric()
    } catch (e) {
      lyricLines = []
      currentLyricEl.innerText = '不自动播放，只在你愿意停下来时响起。'
      nextLyricEl.innerText = ''
    }
  }

  function updateLyric() {
    if (!lyricLines.length) {
      currentLyricEl.innerText = '不自动播放，只在你愿意停下来时响起。'
      nextLyricEl.innerText = ''
      return
    }

    const t = audio.currentTime || 0
    let index = 0

    for (let i = 0; i < lyricLines.length; i++) {
      const next = lyricLines[i + 1]

      if (t >= lyricLines[i].time && (!next || t < next.time)) {
        index = i
        break
      }
    }

    currentLyricEl.innerText = lyricLines[index]?.text || ''
    nextLyricEl.innerText = lyricLines[index + 1]?.text || ''
  }

  function renderPlaylist() {
    drawerListEl.innerHTML = musicList.map((item, index) => {
      const active = index === currentIndex ? 'active' : ''

      return `
        <div class="fc-play-item ${active}" data-index="${index}">
          <div class="fc-play-num">${String(index + 1).padStart(2, '0')}</div>
          <div class="fc-play-meta">
            <div class="fc-play-name">${item.name}</div>
            <div class="fc-play-artist">${item.artist}</div>
          </div>
          <img class="fc-play-thumb" src="${item.cover}" alt="${item.name}">
        </div>
      `
    }).join('')

    drawerListEl.querySelectorAll('.fc-play-item').forEach(el => {
      el.addEventListener('click', () => {
        const idx = Number(el.dataset.index)

        currentIndex = idx
        loadTrack(currentIndex, true)
        closeDrawer()
      })
    })
  }

  function updateModeText() {
    if (playMode === 'order') {
      modeTextEl.innerText = '顺序播放'
      modeBtn.innerHTML = '<i class="fas fa-repeat"></i>'
    }

    if (playMode === 'loop') {
      modeTextEl.innerText = '单曲循环'
      modeBtn.innerHTML = '<i class="fas fa-rotate-right"></i>'
    }

    if (playMode === 'random') {
      modeTextEl.innerText = '随机播放'
      modeBtn.innerHTML = '<i class="fas fa-shuffle"></i>'
    }
  }

  function updatePlayBtn() {
    playBtn.innerHTML = audio.paused
      ? '<i class="fas fa-play"></i>'
      : '<i class="fas fa-pause"></i>'
  }

  function updateTrackInfo() {
    const item = musicList[currentIndex]

    titleEl.innerText = item.name
    artistEl.innerText = item.artist
    coverEl.src = item.cover
    bgEl.style.backgroundImage = `url("${item.cover}")`

    renderPlaylist()
  }

  function loadTrack(index, autoplay = false) {
    const item = musicList[index]

    audio.src = item.url

    updateTrackInfo()
    loadLyric(item.lrc)

    progressEl.value = 0
    currentTimeEl.innerText = '00:00'
    durationEl.innerText = '00:00'

    audio.load()

    if (autoplay) {
      audio.play().catch(() => {})
    } else {
      updatePlayBtn()
    }

    clearButtonState()
  }

  function playPrev() {
    if (playMode === 'random') {
      currentIndex = Math.floor(Math.random() * musicList.length)
    } else {
      currentIndex = (currentIndex - 1 + musicList.length) % musicList.length
    }

    loadTrack(currentIndex, true)
  }

  function playNext() {
    if (playMode === 'random') {
      currentIndex = Math.floor(Math.random() * musicList.length)
    } else {
      currentIndex = (currentIndex + 1) % musicList.length
    }

    loadTrack(currentIndex, true)
  }

  function autoNext() {
    if (playMode === 'loop') {
      audio.currentTime = 0
      audio.play().catch(() => {})
      return
    }

    playNext()
  }

  function openDrawer() {
    drawerEl.classList.add('show')
    clearButtonState()
  }

  function closeDrawer() {
    drawerEl.classList.remove('show')
    clearButtonState()
  }

  playBtn.addEventListener('click', () => {
    pressButton(playBtn)

    if (audio.paused) {
      audio.play().catch(() => {})
    } else {
      audio.pause()
    }
  })

  prevBtn.addEventListener('click', () => {
    pressButton(prevBtn)
    playPrev()
  })

  nextBtn.addEventListener('click', () => {
    pressButton(nextBtn)
    playNext()
  })

  modeBtn.addEventListener('click', () => {
    pressButton(modeBtn)

    if (playMode === 'order') {
      playMode = 'loop'
    } else if (playMode === 'loop') {
      playMode = 'random'
    } else {
      playMode = 'order'
    }

    updateModeText()
    clearButtonState()
  })

  listBtn.addEventListener('click', () => {
    pressButton(listBtn)

    if (drawerEl.classList.contains('show')) {
      closeDrawer()
    } else {
      openDrawer()
    }
  })

  drawerCloseEl.addEventListener('click', () => {
    pressButton(drawerCloseEl)
    closeDrawer()
  })

  if (exitBtn) {
    exitBtn.addEventListener('click', () => {
      pressButton(exitBtn)

      setTimeout(() => {
        if (window.history.length > 1) {
          window.history.back()
        } else {
          window.location.href = '/'
        }
      }, 80)
    })
  }

  progressEl.addEventListener('input', () => {
    if (!audio.duration) return

    const ratio = Number(progressEl.value) / 1000
    audio.currentTime = ratio * audio.duration
    updateLyric()
  })

  audio.addEventListener('loadedmetadata', () => {
    durationEl.innerText = formatTime(audio.duration)
  })

  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return

    progressEl.value = Math.floor((audio.currentTime / audio.duration) * 1000)
    currentTimeEl.innerText = formatTime(audio.currentTime)
    durationEl.innerText = formatTime(audio.duration)

    updateLyric()
  })

  audio.addEventListener('play', () => {
    updatePlayBtn()
    clearButtonState()
  })

  audio.addEventListener('pause', () => {
    updatePlayBtn()
    clearButtonState()
  })

  audio.addEventListener('ended', () => {
    autoNext()
  })

  document.addEventListener('touchend', () => {
    setTimeout(clearButtonState, 80)
  })

  document.addEventListener('mouseup', () => {
    setTimeout(clearButtonState, 80)
  })

  updateModeText()
  renderPlaylist()
  loadTrack(currentIndex, false)
})
